<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" fill="none">
  <defs>
    <linearGradient id="domeGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#5B5368"/>
      <stop offset="100%" stop-color="#8E85A3"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#8E85A3"/>
      <stop offset="100%" stop-color="#B5A9C8"/>
    </linearGradient>
  </defs>

  <!-- Mark: Dome + Listening Waves -->
  <g transform="translate(90, 90)">
    <!-- Outer dome -->
    <path d="M-50,40 Q-50,-40 0,-50 Q50,-40 50,40"
          stroke="url(#domeGrad)" stroke-width="3.5" fill="none"
          stroke-linecap="round"/>

    <!-- Inner arch -->
    <path d="M-32,40 Q-32,-20 0,-28 Q32,-20 32,40"
          stroke="url(#accentGrad)" stroke-width="2" fill="none"
          stroke-linecap="round" opacity="0.7"/>

    <!-- Listening waves (right side, ascending) -->
    <path d="M24,15 Q30,12 24,8" stroke="#B5A9C8" stroke-width="2"
          fill="none" stroke-linecap="round" opacity="0.9"/>
    <path d="M28,20 Q36,15 28,8" stroke="#8E85A3" stroke-width="2"
          fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M32,25 Q42,18 32,8" stroke="#5B5368" stroke-width="2"
          fill="none" stroke-linecap="round" opacity="0.5"/>

    <!-- Ground dot -->
    <circle cx="0" cy="42" r="3" fill="#8E85A3"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(155, 70)">
    <text font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif"
          font-size="52" font-weight="700" letter-spacing="4"
          fill="#2B2738">
      SAMAANA
    </text>
    <!-- Accent underline -->
    <rect x="6" y="12" width="140" height="3" rx="1.5" fill="url(#accentGrad)" opacity="0.8"/>
  </g>

  <!-- Tagline -->
  <g transform="translate(162, 108)">
    <text font-family="'Inter', system-ui, sans-serif"
          font-size="14" font-weight="400" letter-spacing="8"
          fill="#5B5368" opacity="0.7">
      LISTEN  ·  BUILD  ·  ELEVATE
    </text>
  </g>
</svg>
